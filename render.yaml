services:
  - type: web
    name: yuehao-canteen-meal-vision
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODELS
        value: google/gemini-2.5-pro,openai/gpt-4o,google/gemini-2.5-flash,openai/gpt-4o-mini
      - key: OPENROUTER_APP_NAME
        value: Yuehao Canteen
      - key: RATE_LIMIT_PER_MINUTE
        value: "30"
